name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Create Expo project (if not exists)
        run: |
          # Check if eas project exists
          eas project:info --non-interactive 2>/dev/null || eas init --id --non-interactive

      - name: Prebuild native code
        run: npx expo prebuild --platform android --clean

      - name: Build Android APK
        run: eas build --platform android --profile preview --non-interactive --local

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: sudoku-apk
          path: |
            **/*.apk
          if-no-files-found: error
